<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>H-NOTE Creative Solutions</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --black: #000000;
  --white: #FFFFFF;
  --gold: #f0d78c;
  --gold-dim: #b8a45e;
  --charcoal: #111111;
  --border: #1a1a1a;
  --muted: #a0a0a0;
  --font-serif: Georgia, 'Times New Roman', Times, serif;
  --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  --tracking: 0.16em;
  --tracking-sm: 0.08em;
}

html { scroll-behavior: smooth; }

body {
  font-family: var(--font-serif);
  background: var(--black);
  color: var(--white);
  -webkit-font-smoothing: antialiased;
  line-height: 1.7;
}

a { color: inherit; text-decoration: none; }

/* Navigation */
.nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 1.25rem 3rem;
  background: rgba(0,0,0,0.92);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--border);
}

.nav-brand {
  font-size: 0.85rem;
  letter-spacing: var(--tracking);
  color: var(--gold);
}

.nav-links {
  display: flex;
  gap: 2rem;
  list-style: none;
}

.nav-links a {
  font-family: var(--font-sans);
  font-size: 0.68rem;
  letter-spacing: var(--tracking);
  text-transform: uppercase;
  color: #666666;
  transition: color 0.2s;
}

.nav-links a:hover { color: var(--gold); }

/* Layout Grid Standards */
section { padding: 5rem 2rem; background: var(--black); position: relative; z-index: 5; }

.container {
  max-width: 960px;
  margin: 0 auto;
}

.section-label {
  font-family: var(--font-sans);
  font-size: 0.6rem;
  letter-spacing: var(--tracking);
  text-transform: uppercase;
  color: var(--gold);
  font-weight: 600;
  margin-bottom: 1rem;
}

.section-heading {
  font-size: clamp(1.4rem, 3vw, 2rem);
  font-weight: 400;
  letter-spacing: 0.04em;
  line-height: 1.25;
  margin-bottom: 1.25rem;
}

.section-desc {
  font-family: var(--font-sans);
  font-size: 0.9rem;
  color: var(--muted);
  line-height: 1.8;
  max-width: 55ch;
}

/* Clean Promotional Advertising Section for Nexus Engine */
.promo-highlight {
  margin-top: 2.5rem;
  padding: 3rem;
  border-left: 2px solid var(--gold);
  background: var(--charcoal);
}

.promo-highlight h3 {
  font-family: var(--font-sans);
  font-size: 1.1rem;
  letter-spacing: var(--tracking-sm);
  color: var(--gold);
  text-transform: uppercase;
  margin-bottom: 1rem;
}

.promo-highlight p {
  font-size: 0.95rem;
  color: var(--white);
  line-height: 1.8;
}

/* Pricing Section */
.pricing { border-top: 1px solid var(--border); }

.pricing-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 1px;
  background: var(--border);
  border: 1px solid var(--border);
  margin-top: 2.5rem;
}

.tier {
  background: var(--black);
  padding: 2.5rem 2rem;
  display: flex;
  flex-direction: column;
}

.tier-label {
  font-family: var(--font-sans);
  font-size: 0.58rem;
  letter-spacing: var(--tracking);
  color: var(--gold);
  font-weight: 600;
  text-transform: uppercase;
  margin-bottom: 0.75rem;
}

.tier h3 {
  font-size: 1.15rem;
  font-weight: 400;
  letter-spacing: 0.03em;
  margin-bottom: 0.5rem;
}

.tier-desc {
  font-family: var(--font-sans);
  font-size: 0.8rem;
  color: var(--muted);
  line-height: 1.6;
  margin-bottom: 1.5rem;
  flex: 1;
}

.tier-features {
  list-style: none;
  margin-bottom: 2rem;
}

.tier-features li {
  font-family: var(--font-sans);
  font-size: 0.8rem;
  color: var(--muted);
  padding: 0.4rem 0;
  border-bottom: 1px solid var(--border);
  line-height: 1.5;
}

.tier-features li:last-child { border-bottom: none; }

.tier-cta {
  font-family: var(--font-sans);
  font-size: 0.68rem;
  font-weight: 600;
  letter-spacing: var(--tracking);
  text-transform: uppercase;
  padding: 0.9rem 1.5rem;
  text-align: center;
  transition: opacity 0.3s, transform 0.3s;
}

.tier-cta:hover { transform: translateY(-1px); }
.tier-cta--gold { background: var(--gold); color: var(--black); }
.tier-cta--outline { border: 1px solid var(--gold-dim); color: var(--gold); }

/* Unified Gateway Styles */
.gateway-section {
  border-top: 1px solid var(--border);
  background: #020202;
}

.terminal-gate {
  margin-top: 3rem;
  border: 1px solid var(--border);
  background: var(--charcoal);
  padding: 3rem 2rem;
  text-align: center;
  max-width: 500px;
  margin-left: auto;
  margin-right: auto;
}

.auth-tabs {
  display: flex;
  justify-content: center;
  gap: 1.5rem;
  margin-bottom: 2rem;
  border-bottom: 1px solid var(--border);
  padding-bottom: 1rem;
}

.auth-tab {
  font-family: var(--font-sans);
  font-size: 0.68rem;
  letter-spacing: var(--tracking);
  text-transform: uppercase;
  color: #666666;
  cursor: pointer;
  transition: color 0.2s;
}

.auth-tab.active, .auth-tab:hover { color: var(--gold); }

.auth-panel { display: none; }
.auth-panel.active { display: block; }

.auth-input {
  width: 100%;
  background: var(--black);
  border: 1px solid var(--border);
  padding: 0.85rem 1rem;
  color: var(--white);
  font-family: var(--font-sans);
  font-size: 0.8rem;
  margin-bottom: 1rem;
  text-align: center;
}

.auth-input:focus { border-color: var(--gold-dim); outline: none; }

.auth-btn {
  width: 100%;
  background: var(--gold);
  color: var(--black);
  border: none;
  padding: 0.9rem;
  font-family: var(--font-sans);
  font-size: 0.68rem;
  font-weight: 600;
  letter-spacing: var(--tracking);
  text-transform: uppercase;
  cursor: pointer;
  transition: opacity 0.2s;
}

.auth-btn:hover { opacity: 0.85; }

/* Hidden Dashboards - Unlocks via JS */
.hidden-workspace {
  display: none;
  border-top: 1px dashed var(--gold-dim);
  animation: fadeIn 0.6s ease forwards;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.user-profile-widget {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 1rem;
  margin-top: 2rem;
  padding: 1rem;
  background: rgba(240, 215, 140, 0.03);
  border: 1px solid var(--gold-dim);
}

.avatar-container {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: 1px solid var(--gold);
  background: #222 url('https://i.ibb.co/wm165fj/Best-Randy.jpg') center center / cover no-repeat;
}

.avatar-text {
  font-family: var(--font-sans);
  font-size: 0.7rem;
  letter-spacing: var(--tracking-sm);
  color: var(--gold);
  text-transform: uppercase;
  font-weight: 600;
}

/* Services / Curriculum Grid */
.services { border-top: 1px solid var(--border); }

.services-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 1px;
  background: var(--border);
  border: 1px solid var(--border);
  margin-top: 2.5rem;
}

.service {
  background: var(--black);
  padding: 2.25rem 1.75rem;
}

.service-number {
  font-family: var(--font-sans);
