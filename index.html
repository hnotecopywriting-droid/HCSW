<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>H-NOTE Creative Solutions</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --black: #000000;
  --white: #FFFFFF;
  --gold: #f0d78c;
  --gold-dim: #b8a45e;
  --charcoal: #111111;
  --border: #1a1a1a;
  --muted: #666666;
  --font-serif: Georgia, 'Times New Roman', Times, serif;
  --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  --tracking: 0.16em;
  --tracking-sm: 0.08em;
}

html { scroll-behavior: smooth; }

body {
  font-family: var(--font-serif);
  background: var(--black);
  color: var(--white);
  -webkit-font-smoothing: antialiased;
  line-height: 1.7;
}

a { color: inherit; text-decoration: none; }

.nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 1.25rem 3rem;
  background: rgba(0,0,0,0.92);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--border);
}

.nav-brand {
  font-size: 0.85rem;
  letter-spacing: var(--tracking);
  color: var(--gold);
}

.nav-links {
  display: flex;
  gap: 2rem;
  list-style: none;
}

.nav-links a {
  font-family: var(--font-sans);
  font-size: 0.68rem;
  letter-spacing: var(--tracking);
  text-transform: uppercase;
  color: var(--muted);
  transition: color 0.2s;
}

.nav-links a:hover { color: var(--gold); }

.hero {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 6rem 2rem;
  position: relative;
  overflow: hidden;
}

.hero::before {
  content: '';
  position: absolute;
  inset: 0;
  background: url('background.png') center center / cover no-repeat;
  opacity: 0.15;
  pointer-events: none;
}

.hero::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.9) 100%);
  pointer-events: none;
}

.hero > * {
  position: relative;
  z-index: 2;
}

.hero-eyebrow {
  font-family: var(--font-sans);
  font-size: 0.62rem;
  letter-spacing: var(--tracking);
  text-transform: uppercase;
  color: var(--gold);
  font-weight: 600;
  margin-bottom: 1.5rem;
}

.hero h1 {
  font-size: clamp(2rem, 5vw, 3.2rem);
  font-weight: 400;
  letter-spacing: var(--tracking-sm);
  line-height: 1.15;
  max-width: 16ch;
  margin-bottom: 1.5rem;
}

.hero-sub {
  font-family: var(--font-sans);
  font-size: 0.92rem;
  color: var(--muted);
  max-width: 50ch;
  line-height: 1.8;
  margin-bottom: 3rem;
}

.hero-cta {
  display: inline-block;
  font-family: var(--font-sans);
  font-size: 0.72rem;
  font-weight: 600;
  letter-spacing: var(--tracking);
  text-transform: uppercase;
  color: var(--black);
  background: var(--gold);
  padding: 1rem 3rem;
  transition: opacity 0.3s, transform 0.3s;
}

.hero-cta:hover { opacity: 0.85; transform: translateY(-1px); }

section { padding: 5rem 2rem; }

.container {
  max-width: 960px;
  margin: 0 auto;
}

.section-label {
  font-family: var(--font-sans);
  font-size: 0.6rem;
  letter-spacing: var(--tracking);
  text-transform: uppercase;
  color: var(--gold);
  font-weight: 600;
  margin-bottom: 1rem;
}

.section-heading {
  font-size: clamp(1.4rem, 3vw, 2rem);
  font-weight: 400;
  letter-spacing: 0.04em;
  line-height: 1.25;
  margin-bottom: 1.25rem;
}

.section-desc {
  font-family: var(--font-sans);
  font-size: 0.9rem;
  color: var(--muted);
  line-height: 1.8;
  max-width: 55ch;
}

.about { border-top: 1px solid var(--border); }

.about-grid {
  display: grid;
  grid-template-columns: 280px 1fr;
  gap: 3.5rem;
  margin-top: 2.5rem;
  align-items: start;
}

.founder-photo {
  width: 100%;
  aspect-ratio: 3/4;
  border: 1px solid var(--gold-dim);
  background: url('Best Randy.JPG') center center / cover no-repeat;
  background-color: var(--charcoal);
}

.founder-name {
  font-family: var(--font-sans);
  font-size: 0.62rem;
  letter-spacing: var(--tracking);
  text-transform: uppercase;
  color: var(--gold);
  font-weight: 600;
  margin-bottom: 1.5rem;
}

.founder-text h3 {
  font-size: 1.15rem;
  font-weight: 400;
  letter-spacing: 0.04em;
  margin-bottom: 0.75rem;
}

.founder-bio {
  font-family: var(--font-sans);
  font-size: 0.88rem;
  color: var(--muted);
  line-height: 1.8;
  margin-bottom: 1.25rem;
}

.services { border-top: 1px solid var(--border); }

.services-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 1px;
  background: var(--border);
  border: 1px solid var(--border);
  margin-top: 2.5rem;
}

.service {
  background: var(--black);
  padding: 2.25rem 1.75rem;
}

.service-number {
  font-family: var(--font-sans);
  font-size: 0.58rem;
  letter-spacing: var(--tracking);
  color: var(--gold-dim);
  font-weight: 600;
  margin-bottom: 0.75rem;
}

.service h3 {
  font-size: 1.05rem;
  font-weight: 400;
  letter-spacing: 0.03em;
  margin-bottom: 0.6rem;
  line-height: 1.3;
}

.service p {
  font-family: var(--font-sans);
  font-size: 0.82rem;
  color: var(--muted);
  line-height: 1.65;
}

.video-section { border-top: 1px solid var(--border); }

.video-frame {
  margin-top: 2rem;
  position: relative;
  width: 100%;
  padding-top: 56.25%;
  border: 1px solid var(--gold-dim);
  background: var(--charcoal);
}

.video-inner {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 0.75rem;
}

.play-icon {
  width: 48px;
  height: 48px;
  border: 1px solid var(--gold-dim);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
}

.play-icon svg { width: 16px; height: 16px; fill: var(--gold); margin-left: 2px; }

.video-text {
  font-family: var(--font-sans);
  font-size: 0.65rem;
  letter-spacing: var(--tracking);
  color: var(--muted);
  text-transform: uppercase;
}

.embed-zone {
  margin-top: 2.5rem;
  border: 1px solid var(--border);
  background: var(--charcoal);
}

.embed-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0.85rem 1.25rem;
  border-bottom: 1px solid var(--border);
  background: var(--black);
}

.embed-title {
  font-family: var(--font-sans);
  font-size: 0.62rem;
  letter-spacing: var(--tracking);
  text-transform: uppercase;
  color: var(--gold);
  font-weight: 600;
}

.embed-status {
  font-family: var(--font-sans);
  font-size: 0.58rem;
  letter-spacing: var(--tracking);
  color: var(--muted);
  text-transform: uppercase;
}

.embed-accent {
  height: 2px;
  background: linear-gradient(90deg, var(--gold-dim), transparent);
}

.embed-body {
  min-height: 300px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 1rem;
  padding: 2.5rem;
}

.embed-body p {
  font-family: var(--font-sans);
  font-size: 0.78rem;
  color: #444;
  text-align: center;
  max-width: 36ch;
  line-height: 1.6;
}

.embed-tag {
  font-family: var(--font-sans);
  font-size: 0.6rem;
  letter-spacing: var(--tracking);
  color: #333;
  text-transform: uppercase;
}

.pricing { border-top: 1px solid var(--border); }

.pricing-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 1px;
  background: var(--border);
  border: 1px solid var(--border);
  margin-top: 2.5rem;
}

.tier {
  background: var(--black);
  padding: 2.5rem 2rem;
  display: flex;
  flex-direction: column;
}

.tier-label {
  font-family: var(--font-sans);
  font-size: 0.58rem;
  letter-spacing: var(--tracking);
  color: var(--gold);
  font-weight: 600;
  text-transform: uppercase;
  margin-bottom: 0.75rem;
}

.tier h3 {
  font-size: 1.15rem;
  font-weight: 400;
  letter-spacing: 0.03em;
  margin-bottom: 0.5rem;
}

.tier-desc {
  font-family: var(--font-sans);
  font-size: 0.8rem;
  color: var(--muted);
  line-height: 1.6;
  margin-bottom: 1.5rem;

}

  font-size: 0.8rem;
  color: var(--muted);
  padding: 0.4rem 0;
  border-bottom: 1px solid var(--border);
  line-height: 1.5;
}
