<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H-Note Nexus | Login</title>
    <style>
        body {
            background-color: #0a0a0c;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-card {
            background: #1a1a2e;
            padding: 40px;
            border-radius: 15px;
            border: 1px solid #6a1b9a; /* Deep Purple accent */
            box-shadow: 0 0 20px rgba(106, 27, 154, 0.3);
            text-align: center;
            width: 300px;
        }
        h1 { color: #ffca28; margin-bottom: 10px; } /* Amber accent */
        p { font-size: 0.9em; margin-bottom: 25px; opacity: 0.8; }
        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 5px;
            border: none;
            background: #252545;
            color: white;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 10px;
            background: #6a1b9a;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        button:hover { background: #8e24aa; }
    </style>
</head>
<body>

<div class="login-card">
    <h1>H-Note Nexus</h1>
    <p>The code to the universe is 0110.</p>
    <form id="loginForm">
        <input type="email" id="email" placeholder="Student Email" required>
        <input type="password" id="password" placeholder="Access Key" required>
        <button type="submit">ENTER THE NEXUS</button>
    </form>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        // Placeholder for future logic
        window.location.href = 'dashboard.html'; 
    });
</script>

</body>
</html>
